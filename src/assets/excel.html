<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pure JS Excel</title>
    <link rel="shortcut" href="favicon.ico">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
          rel="stylesheet">

</head>
<body>

<div id="app" class="container">

    <div class="excel">
        <div class="excel__header header">
            <input type="text" class="header__input" value="Новая таблица">
            <div class="header__buttons">
                <div class="header__button">
                        <span class="material-icons">
                            exit_to_app
                        </span>
                </div>
                <div class="header__button">
                        <span class="material-icons">
                            delete
                        </span>
                </div>
            </div>
        </div>
        <div class="excel__toolbar toolbar">
            <div class="toolbar__buttons">
                <div class="toolbar__button">
                        <span class="material-icons">
                            format_align_left
                        </span>
                </div>
                <div class="toolbar__button">
                        <span class="material-icons">
                            format_align_center
                        </span>
                </div>
                <div class="toolbar__button">
                        <span class="material-icons">
                            format_align_right
                        </span>
                </div>
                <div class="toolbar__button">
                        <span class="material-icons">
                            format_bold
                        </span>
                </div>
                <div class="toolbar__button">
                        <span class="material-icons">
                            format_italic
                        </span>
                </div>
                <div class="toolbar__button">
                        <span class="material-icons">
                            format_underlined
                        </span>
                </div>
            </div>
        </div>
        <div class="excel__formula formula">
            <div class="formula__info">fx</div>
            <div class="formula__input" spellcheck="false" contenteditable></div>
        </div>
        <div class="excel__table table">
            <div class="table__row row">
                <div class="row__info">f
                </div>
                <div class="row__data">
                    <div class="row__column">A</div>
                    <div class="row__column">B</div>
                    <div class="row__column">C</div>
                </div>
            </div>
            <div class="table__row row">
                <div class="row__info">
                    1
                </div>
                <div class="row__data">
                    <div contenteditable class="row__cell selected">A1</div>
                    <div contenteditable class="row__cell">B1</div>
                    <div contenteditable class="row__cell">C1</div>
                </div>
            </div>
            <div class="table__row row">
                <div class="row__info">
                    2
                </div>
                <div class="row__data">
                    <div contenteditable class="row__cell selected">A2</div>
                    <div contenteditable class="row__cell">B2</div>
                    <div contenteditable class="row__cell">C2</div>
                </div>
            </div>

        </div>
    </div>
</div>

</div>

</body>
</html>
